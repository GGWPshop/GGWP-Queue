services:
  queue:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ggwp-queue
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "${PORT:-8050}:8050"
    networks:
      - ggwp-network
      - ggwp-gifts_default
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8050/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  ggwp-network:
    external: true
  ggwp-gifts_default:
    external: true
